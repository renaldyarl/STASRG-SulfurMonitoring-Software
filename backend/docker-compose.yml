services:
  postgres:
    image: postgres:16-alpine
    container_name: sulfur_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sulfur
      POSTGRES_PASSWORD: sulfur
      POSTGRES_DB: sulfur_monitoring
    # Host port 5433 to avoid clashing with a native PostgreSQL on 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sulfur -d sulfur_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
